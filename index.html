<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Training Menu</title>
  <style>
    :root {
      --bg: #0c0c14;
      --surface: #13131e;
      --card: #1a1a28;
      --card-hover: #22223a;
      --border: #272740;
      --text: #e8e8f0;
      --text-sub: #6868a0;
      --radius: 14px;
      --accent: #818cf8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      min-height: 100vh; padding-bottom: 80px;
    }

    /* ── Header ── */
    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 14px 16px 12px; position: sticky; top: 0; z-index: 50;
    }
    .header-inner { max-width: 720px; margin: 0 auto; }
    .app-title {
      font-size: 17px; font-weight: 800; letter-spacing: 2.5px;
      background: linear-gradient(90deg, #818cf8, #c084fc);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-bottom: 10px;
    }
    .search-wrap { position: relative; }
    .search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--text-sub); }
    #searchInput {
      width: 100%; background: var(--card); border: 1.5px solid var(--border);
      border-radius: 10px; padding: 9px 12px 9px 34px; color: var(--text);
      font-size: 14px; outline: none; transition: border-color .2s;
    }
    #searchInput::placeholder { color: var(--text-sub); }
    #searchInput:focus { border-color: var(--accent); }

    /* ── Tab bar ── */
    .tab-bar {
      display: flex; max-width: 720px; margin: 0 auto;
      padding: 10px 16px 0; gap: 6px;
    }
    .tab-btn {
      flex: 1; padding: 9px 8px; border-radius: 10px;
      background: var(--card); border: 1.5px solid var(--border);
      color: var(--text-sub); font-size: 13px; font-weight: 700;
      cursor: pointer; transition: all .2s; display: flex;
      align-items: center; justify-content: center; gap: 5px;
    }
    .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ── Views ── */
    .view { display: none; }
    .view.active { display: block; }

    /* ── Body Selector ── */
    .selector-section { max-width: 720px; margin: 0 auto; padding: 20px 16px 0; }
    .selector-heading { text-align: center; margin-bottom: 18px; }
    .selector-heading h2 { font-size: 20px; font-weight: 800; margin-bottom: 5px; }
    .selector-heading p { font-size: 13px; color: var(--text-sub); }
    .view-toggle { display: flex; justify-content: center; gap: 0; margin-bottom: 16px; }
    .view-btn {
      background: var(--card); border: 1.5px solid var(--border);
      padding: 7px 24px; font-size: 13px; font-weight: 700;
      color: var(--text-sub); cursor: pointer; transition: all .2s;
    }
    .view-btn:first-child { border-radius: 20px 0 0 20px; border-right-width: .75px; }
    .view-btn:last-child  { border-radius: 0 20px 20px 0; border-left-width: .75px; }
    .view-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .diagram-layout { display: flex; gap: 14px; align-items: flex-start; justify-content: center; }
    #bodyDiagram { flex-shrink: 0; width: 148px; height: auto; filter: drop-shadow(0 4px 24px rgba(0,0,0,.5)); }
    .chips-list { display: flex; flex-direction: column; gap: 6px; padding-top: 4px; flex: 1; min-width: 0; }
    .muscle-chip {
      display: flex; align-items: center; gap: 8px; padding: 8px 11px;
      border-radius: 10px; background: var(--card); border: 1.5px solid var(--border);
      cursor: pointer; transition: all .18s; min-width: 0; text-align: left;
    }
    .muscle-chip:hover { filter: brightness(1.15); }
    .muscle-chip.active { background: var(--card-hover); }
    .muscle-chip.dim { opacity: .3; }
    .chip-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .chip-label { font-size: 12px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chip-count { font-size: 10px; color: var(--text-sub); margin-left: auto; flex-shrink: 0; }
    .selected-banner {
      display: flex; align-items: center; gap: 12px; background: var(--card);
      border: 1.5px solid var(--border); border-radius: var(--radius);
      padding: 13px 15px; margin-top: 14px; transition: border-color .2s;
    }
    .selected-banner.hidden { display: none; }
    .banner-icon { font-size: 26px; }
    .banner-info { flex: 1; min-width: 0; }
    .banner-name { font-size: 16px; font-weight: 800; }
    .banner-desc { font-size: 11px; color: var(--text-sub); margin-top: 2px; }
    .banner-right { text-align: center; flex-shrink: 0; }
    .banner-count { font-size: 26px; font-weight: 800; }
    .banner-count-label { font-size: 10px; color: var(--text-sub); }
    .clear-btn {
      background: none; border: 1.5px solid var(--border); border-radius: 8px;
      color: var(--text-sub); font-size: 12px; padding: 5px 9px;
      cursor: pointer; flex-shrink: 0; transition: all .2s;
    }
    .clear-btn:hover { border-color: var(--text-sub); color: var(--text); }

    /* ── Exercise Section ── */
    .exercises-section { max-width: 720px; margin: 20px auto 0; padding: 0 16px; }
    .section-bar {
      display: flex; align-items: center; justify-content: space-between;
      border-top: 1px solid var(--border); padding-top: 18px; margin-bottom: 14px;
    }
    .section-bar-title { font-size: 15px; font-weight: 700; }
    .section-bar-count { font-size: 12px; color: var(--text-sub); }
    .exercise-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    @media (min-width: 520px) { .exercise-grid { grid-template-columns: repeat(3, 1fr); } }

    /* Exercise card */
    .exercise-card {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 12px;
      display: flex; flex-direction: column; gap: 5px;
      transition: all .18s; position: relative; overflow: hidden;
      user-select: none;
    }
    .exercise-card::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: var(--accent-color, var(--accent));
    }
    .exercise-card:hover { border-color: var(--accent-color, var(--accent)); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.35); }
    .ex-cat-row { display: flex; align-items: center; gap: 5px; }
    .ex-cat-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; }
    .ex-cat-label { font-size: 9px; font-weight: 700; }
    .log-count-badge {
      margin-left: auto; background: rgba(129,140,248,.15);
      border: 1px solid rgba(129,140,248,.3); border-radius: 10px;
      font-size: 9px; font-weight: 700; color: var(--accent);
      padding: 1px 6px; display: none; align-items: center; gap: 2px;
    }
    .log-count-badge.show { display: flex; }
    .ex-name { font-size: 13px; font-weight: 700; line-height: 1.35; margin-top: 1px; }
    .ex-name-en { font-size: 10px; color: var(--text-sub); }
    .ex-tags { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 3px; }
    .tag { font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 600; }
    .tag-beginner     { background:#0d2b1a; color:#4ade80; }
    .tag-intermediate { background:#2b2200; color:#facc15; }
    .tag-advanced     { background:#2b0d0d; color:#f87171; }
    .tag-barbell      { background:#0d200d; color:#86efac; }
    .tag-dumbbell     { background:#160d2b; color:#c4b5fd; }
    .tag-cable        { background:#2b1600; color:#fdba74; }
    .tag-machine      { background:#1a0d2b; color:#e879f9; }
    .tag-bodyweight   { background:#0d2020; color:#5eead4; }
    .tag-free         { background:#1a1a2b; color:#93c5fd; }
    .ex-actions {
      display: flex; gap: 5px; margin-top: auto;
      padding-top: 7px; border-top: 1px solid var(--border);
    }
    .btn-yt, .btn-log {
      flex: 1; padding: 5px 4px; border-radius: 7px;
      border: 1.5px solid var(--border); background: none;
      font-size: 10px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 3px;
      transition: all .18s; color: var(--text-sub);
    }
    .btn-yt:hover  { border-color: #ff4444; color: #ff4444; background: rgba(255,68,68,.07); }
    .btn-log:hover { border-color: var(--accent-color, var(--accent)); color: var(--accent-color, var(--accent)); background: rgba(129,140,248,.07); }

    /* ── History View ── */
    .history-section { max-width: 720px; margin: 0 auto; padding: 16px 16px 0; }
    .history-stats {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 18px;
    }
    .stat-card {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 14px 10px; text-align: center;
    }
    .stat-num { font-size: 24px; font-weight: 800; color: var(--accent); }
    .stat-label { font-size: 10px; color: var(--text-sub); margin-top: 3px; }

    .history-filter {
      display: flex; gap: 8px; margin-bottom: 14px;
    }
    .hist-search {
      flex: 1; background: var(--card); border: 1.5px solid var(--border);
      border-radius: 10px; padding: 8px 12px; color: var(--text); font-size: 13px; outline: none;
    }
    .hist-search::placeholder { color: var(--text-sub); }
    .hist-search:focus { border-color: var(--accent); }

    .history-empty { text-align: center; padding: 52px 20px; color: var(--text-sub); }
    .history-empty-icon { font-size: 42px; margin-bottom: 12px; }
    .history-empty p { font-size: 14px; line-height: 1.7; }

    /* Day group */
    .day-group { margin-bottom: 20px; }
    .day-label {
      font-size: 12px; font-weight: 700; color: var(--text-sub);
      margin-bottom: 8px; padding-left: 2px;
    }

    /* Log card */
    .log-card {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: var(--radius); overflow: hidden; margin-bottom: 8px;
      transition: border-color .2s;
    }
    .log-card-header {
      display: flex; align-items: center; gap: 10px; padding: 12px 14px;
      cursor: pointer;
    }
    .log-card-header:hover { background: var(--card-hover); }
    .log-cat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .log-info { flex: 1; min-width: 0; }
    .log-ex-name { font-size: 14px; font-weight: 700; }
    .log-summary { font-size: 11px; color: var(--text-sub); margin-top: 2px; }
    .log-chevron {
      font-size: 11px; color: var(--text-sub); transition: transform .2s;
      flex-shrink: 0;
    }
    .log-card.expanded .log-chevron { transform: rotate(90deg); }
    .log-delete-btn {
      background: none; border: 1.5px solid var(--border); border-radius: 7px;
      color: var(--text-sub); font-size: 11px; padding: 4px 8px;
      cursor: pointer; flex-shrink: 0; transition: all .2s;
    }
    .log-delete-btn:hover { border-color: #f87171; color: #f87171; }

    /* Log detail (expanded) */
    .log-detail {
      display: none; padding: 0 14px 12px; border-top: 1px solid var(--border);
    }
    .log-card.expanded .log-detail { display: block; }
    .log-sets-table { width: 100%; border-collapse: collapse; margin: 10px 0 8px; }
    .log-sets-table th {
      font-size: 10px; color: var(--text-sub); font-weight: 600;
      text-align: left; padding: 4px 6px; border-bottom: 1px solid var(--border);
    }
    .log-sets-table td { font-size: 12px; padding: 6px 6px; border-bottom: 1px solid rgba(255,255,255,.04); }
    .log-sets-table tr:last-child td { border-bottom: none; }
    .log-note-text {
      font-size: 12px; color: var(--text-sub); background: rgba(255,255,255,.03);
      border-radius: 8px; padding: 8px 10px; margin-top: 4px; line-height: 1.6;
    }

    /* ── Log Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      display: flex; align-items: flex-end; justify-content: center;
      pointer-events: none; opacity: 0; transition: opacity .25s;
    }
    .modal-overlay.open { pointer-events: all; opacity: 1; }
    .modal-backdrop {
      position: absolute; inset: 0; background: rgba(0,0,0,.6);
      backdrop-filter: blur(4px);
    }
    .modal-sheet {
      position: relative; z-index: 1; width: 100%; max-width: 560px;
      background: var(--surface); border-radius: 22px 22px 0 0;
      border: 1px solid var(--border); border-bottom: none;
      max-height: 90vh; display: flex; flex-direction: column;
      transform: translateY(100%); transition: transform .3s cubic-bezier(.32,.72,0,1);
    }
    .modal-overlay.open .modal-sheet { transform: translateY(0); }
    .modal-grab { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; flex-shrink: 0; }
    .modal-header {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 18px 12px; flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }
    .modal-cat-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .modal-title { font-size: 16px; font-weight: 800; flex: 1; }
    .modal-close-btn {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: 50%; width: 28px; height: 28px;
      color: var(--text-sub); font-size: 13px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .modal-body { overflow-y: auto; padding: 16px 18px; flex: 1; }
    .form-row { margin-bottom: 16px; }
    .form-label { font-size: 12px; font-weight: 700; color: var(--text-sub); margin-bottom: 7px; display: block; }
    .date-input {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: 10px; padding: 9px 12px; color: var(--text);
      font-size: 14px; outline: none; width: 100%;
    }
    .date-input:focus { border-color: var(--accent); }
    /* Sets */
    .sets-header {
      display: grid; grid-template-columns: 36px 1fr 1fr 28px;
      gap: 6px; padding: 0 4px 5px; margin-bottom: 4px;
    }
    .sets-header span { font-size: 10px; color: var(--text-sub); font-weight: 600; text-align: center; }
    .sets-header span:first-child { text-align: left; }
    .set-row {
      display: grid; grid-template-columns: 36px 1fr 1fr 28px;
      gap: 6px; align-items: center; margin-bottom: 7px;
    }
    .set-num-badge {
      width: 28px; height: 28px; border-radius: 8px; background: rgba(129,140,248,.12);
      border: 1px solid rgba(129,140,248,.25); color: var(--accent);
      font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center;
    }
    .set-input {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: 9px; padding: 8px 10px; color: var(--text);
      font-size: 14px; font-weight: 600; outline: none; text-align: center; width: 100%;
    }
    .set-input:focus { border-color: var(--accent); }
    .set-input::placeholder { color: var(--text-sub); font-weight: 400; }
    .set-delete-btn {
      background: none; border: 1.5px solid var(--border); border-radius: 7px;
      color: var(--text-sub); font-size: 13px; width: 28px; height: 28px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all .18s;
    }
    .set-delete-btn:hover { border-color: #f87171; color: #f87171; }
    .add-set-btn {
      width: 100%; padding: 9px; border-radius: 10px;
      border: 1.5px dashed var(--border); background: none;
      color: var(--text-sub); font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all .2s; margin-top: 4px;
    }
    .add-set-btn:hover { border-color: var(--accent); color: var(--accent); }
    .note-input {
      width: 100%; background: var(--card); border: 1.5px solid var(--border);
      border-radius: 10px; padding: 10px 12px; color: var(--text);
      font-size: 13px; outline: none; resize: none; font-family: inherit;
      line-height: 1.6; min-height: 72px;
    }
    .note-input::placeholder { color: var(--text-sub); }
    .note-input:focus { border-color: var(--accent); }
    /* Modal footer */
    .modal-footer {
      display: flex; gap: 8px; padding: 12px 18px 24px; flex-shrink: 0;
      border-top: 1px solid var(--border);
    }
    .btn-cancel {
      flex: 1; padding: 12px; border-radius: 12px;
      border: 1.5px solid var(--border); background: none;
      color: var(--text-sub); font-size: 14px; font-weight: 700; cursor: pointer;
    }
    .btn-save {
      flex: 2; padding: 12px; border-radius: 12px;
      border: none; background: var(--accent);
      color: #fff; font-size: 14px; font-weight: 700; cursor: pointer;
      transition: filter .2s;
    }
    .btn-save:hover { filter: brightness(1.1); }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: #1e293b; border: 1px solid #334155; border-radius: 40px;
      padding: 10px 18px; font-size: 13px; font-weight: 600; color: #f1f5f9;
      display: flex; align-items: center; gap: 7px;
      opacity: 0; transition: opacity .3s, transform .3s; pointer-events: none; z-index: 300;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Misc ── */
    .empty { text-align: center; padding: 52px 20px; color: var(--text-sub); }
    .empty-icon { font-size: 38px; margin-bottom: 10px; }

    /* ── Timer Widget ── */
    .timer-widget {
      position: fixed; bottom: 24px; right: 16px; z-index: 150;
      display: flex; flex-direction: column; align-items: flex-end; gap: 10px;
    }
    .timer-fab {
      width: 54px; height: 54px; border-radius: 50%;
      background: var(--surface); border: 1.5px solid var(--border);
      box-shadow: 0 4px 18px rgba(0,0,0,.45);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800; color: var(--text); transition: all .2s;
      flex-direction: column; gap: 1px; line-height: 1;
    }
    .timer-fab-icon { font-size: 18px; line-height: 1; }
    .timer-fab-time { font-size: 10px; font-weight: 800; color: var(--accent); display: none; }
    .timer-fab.running { background: var(--accent); border-color: var(--accent); box-shadow: 0 4px 22px rgba(129,140,248,.45); }
    .timer-fab.running .timer-fab-icon { display: none; }
    .timer-fab.running .timer-fab-time { display: block; color: #fff; font-size: 13px; }
    .timer-fab:hover { transform: scale(1.08); }

    .timer-panel {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 20px; padding: 16px 16px 14px; width: 248px;
      box-shadow: 0 10px 36px rgba(0,0,0,.5);
      animation: panel-slide-in .22s ease;
    }
    .timer-panel.hidden { display: none; }
    @keyframes panel-slide-in {
      from { opacity: 0; transform: translateY(10px) scale(.97); }
      to   { opacity: 1; transform: translateY(0)   scale(1); }
    }
    .timer-panel-hd {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;
    }
    .timer-panel-title { font-size: 12px; font-weight: 700; color: var(--text-sub); }
    .timer-panel-close {
      background: none; border: none; color: var(--text-sub); font-size: 14px;
      cursor: pointer; padding: 2px 6px; border-radius: 6px;
    }
    .timer-panel-close:hover { color: var(--text); }

    /* Ring */
    .timer-ring-wrap {
      position: relative; width: 116px; height: 116px; margin: 0 auto 14px;
    }
    .timer-ring { width: 100%; height: 100%; }
    .timer-ring-bg   { fill: none; stroke: var(--border); stroke-width: 7; }
    .timer-ring-prog { fill: none; stroke: var(--accent); stroke-width: 7; stroke-linecap: round;
      transition: stroke-dashoffset .9s linear, stroke .3s; }
    .timer-ring-wrap.warn .timer-ring-prog { stroke: #ef4444; }
    .timer-number {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 800; letter-spacing: .5px; color: var(--text);
    }
    .timer-ring-wrap.warn .timer-number { color: #ef4444; animation: num-pulse 1s ease-in-out infinite; }
    @keyframes num-pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.07)} }

    /* Presets */
    .timer-presets { display: grid; grid-template-columns: repeat(3,1fr); gap: 5px; margin-bottom: 10px; }
    .preset-btn {
      padding: 6px 2px; border-radius: 8px;
      background: var(--card); border: 1.5px solid var(--border);
      color: var(--text-sub); font-size: 10px; font-weight: 700; cursor: pointer; transition: all .18s;
    }
    .preset-btn.active { background: rgba(129,140,248,.18); border-color: var(--accent); color: var(--accent); }
    .preset-btn:hover   { border-color: var(--accent); color: var(--accent); }

    /* Custom time input */
    .timer-custom {
      margin-bottom: 12px; padding: 9px 10px 8px;
      background: var(--card); border: 1.5px solid var(--border); border-radius: 11px;
    }
    .timer-custom-label {
      display: block; font-size: 9px; font-weight: 700;
      color: var(--text-sub); letter-spacing: .06em; margin-bottom: 8px;
    }
    .timer-custom-row { display: flex; align-items: center; gap: 5px; }
    .timer-spin-group { display: flex; align-items: center; gap: 3px; flex: 1; }
    .timer-spin-btn {
      width: 26px; height: 26px; border-radius: 7px;
      background: var(--surface); border: 1.5px solid var(--border);
      color: var(--text); font-size: 14px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s; flex-shrink: 0; line-height: 1;
    }

      color: #fff; font-size: 11px; font-weight: 800;

      color: var(--text-sub); font-size: 17px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all .18s;
    }
    .timer-reset-btn:hover { border-color: var(--accent); color: var(--accent); }
    .timer-start-btn {
      flex: 1; padding: 11px 8px; border-radius: 11px; border: none;
      background: var(--accent); color: #fff; font-size: 13px; font-weight: 700;
      cursor: pointer; transition: filter .2s;
    }
    .timer-start-btn:hover { filter: brightness(1.1); }

    .pr-badge {
      margin-left: 3px; font-size: 10px; padding: 1px 5px; border-radius: 5px;
      background: rgba(250,204,21,.15); border: 1px solid rgba(250,204,21,.35);

    .pr-badge.show { display: inline-flex; }
    .pr-history-tag {
      font-size: 9px; padding: 1px 5px; border-radius: 4px;
      background: rgba(250,204,21,.15); color: #facc15; font-weight: 700;
      margin-left: 5px; vertical-align: middle;
    }

    /* ── PR Celebration Overlay ── */
    .pr-overlay {
      position: fixed; inset: 0; z-index: 400;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,.55); backdrop-filter: blur(6px);
      opacity: 0; pointer-events: none; transition: opacity .3s;
    }
    .pr-overlay.show { opacity: 1; pointer-events: all; }
    .pr-card {
      background: var(--surface); border: 2px solid #facc15;
      border-radius: 24px; padding: 36px 44px;
      text-align: center; max-width: 310px;
      box-shadow: 0 0 70px rgba(250,204,21,.22);
      animation: pr-pop .38s cubic-bezier(.68,-.55,.265,1.55);

    .pr-title   { font-size: 20px; font-weight: 800; color: #facc15; margin-bottom: 8px; }
    .pr-ex-name { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
    .pr-e1rm    { font-size: 26px; font-weight: 800; color: #facc15; margin-bottom: 4px; }
    .pr-value   { font-size: 13px; color: var(--text-sub); margin-bottom: 16px; }
    .pr-tap     { font-size: 11px; color: var(--text-sub); }

    .confetti-wrap {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;

    .conf-piece {
      position: absolute; top: -16px; border-radius: 2px;
      animation: conf-fall linear forwards;

      85%  { opacity: 1; }
      100% { transform: translateY(105vh)  rotate(800deg); opacity: 0; }
    }

function getLogs() {
  try { return JSON.parse(localStorage.getItem('training_logs') || '[]'); } catch { return []; }
}
function saveLogs(logs) {
  localStorage.setItem('training_logs', JSON.stringify(logs));
}
function addLog(log) {
  const logs = getLogs();
  logs.unshift(log);
  saveLogs(logs);

/* ───────────────────────────────────
   PR (PERSONAL RECORDS)
─────────────────────────────────── */
function getStoredPRs() {
  try { return JSON.parse(localStorage.getItem('training_prs') || '{}'); } catch { return {}; }
}
function savePRs(prs) { localStorage.setItem('training_prs', JSON.stringify(prs)); }

// Epley formula: estimated 1-rep max
function calc1RM(weight, reps) {
  if (!weight || !reps || reps < 1) return 0;
  return reps === 1 ? weight : weight * (1 + reps / 30);
}

// Returns the new PR object if a PR was set, otherwise null
function checkAndUpdatePR(log) {
  let best = { e1rm: 0, weight: 0, reps: 0 };
  log.sets.forEach(s => {
    if (!s.weight || !s.reps) return;
    const e = calc1RM(s.weight, s.reps);
    if (e > best.e1rm) best = { e1rm: e, weight: s.weight, reps: s.reps };
  });
  if (!best.e1rm) return null;
  const prs      = getStoredPRs();
  const existing = prs[log.exerciseName];
  if (!existing || best.e1rm > existing.e1rm) {
    prs[log.exerciseName] = { ...best, date: log.date, logId: log.id };
    savePRs(prs);
    return prs[log.exerciseName];
  }
  return null;
}

function hasPR(name) { return !!getStoredPRs()[name]; }

function showPRCelebration(name, pr) {
  showConfetti();
  document.getElementById('prExName').textContent = name;
  document.getElementById('prE1rm').textContent   = `推定1RM: ${Math.round(pr.e1rm)} kg`;
  document.getElementById('prValue').textContent  = `${pr.weight}kg × ${pr.reps}回`;
  const overlay = document.getElementById('prOverlay');
  overlay.classList.add('show');
  const dismiss = () => { overlay.classList.remove('show'); overlay.removeEventListener('click', dismiss); };
  setTimeout(dismiss, 4500);
  overlay.addEventListener('click', dismiss);
}

function showConfetti() {

/* ───────────────────────────────────
   INTERVAL TIMER
─────────────────────────────────── */
const CIRC = 2 * Math.PI * 42;   // ≈ 263.9  (r=42 in viewBox 100×100)
let timerTotal    = 90;
let timerRemain   = 90;
let timerTick     = null;
let timerRunning  = false;

function formatTime(s) {
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}

function updateTimerUI() {
  const progress  = timerRemain / timerTotal;
  const ring      = document.getElementById('timerRingProg');
  const numEl     = document.getElementById('timerNumber');
  const fabTime   = document.getElementById('timerFabTime');
  const fab       = document.getElementById('timerFab');
  const startBtn  = document.getElementById('timerStartBtn');
  const wrap      = document.getElementById('timerRingWrap');

  ring.setAttribute('stroke-dashoffset', CIRC * (1 - progress));
  numEl.textContent  = formatTime(timerRemain);
  fabTime.textContent = formatTime(timerRemain);

  const warn = timerRunning && timerRemain <= 10;
  wrap.classList.toggle('warn', warn);
  fab.classList.toggle('running', timerRunning);

  if (timerRunning) {
    startBtn.textContent = '⏸ 一時停止';
    startBtn.classList.add('paused');
  } else {
    startBtn.textContent = (timerRemain < timerTotal && timerRemain > 0) ? '▶ 再開' : '▶ スタート';
    startBtn.classList.remove('paused');
  }
}

function timerFinished() {
  timerRunning = false;
  clearInterval(timerTick); timerTick = null;
  timerRemain = timerTotal;
  updateTimerUI();
  playBeep();
  if (navigator.vibrate) navigator.vibrate([200,100,200,100,300]);
  showToast('⏱ インターバル終了！次のセットへ');
}

function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [[0, 440, .18], [.22, 554, .18], [.44, 880, .32]].forEach(([t, freq, dur]) => {
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine'; osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, ctx.currentTime + t);
      gain.gain.linearRampToValueAtTime(.38, ctx.currentTime + t + .02);
      gain.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + t + dur);
      osc.start(ctx.currentTime + t); osc.stop(ctx.currentTime + t + dur + .05);
    });
  } catch(e) {}
}

function timerStart() {
  if (timerRunning) {
    // pause
    timerRunning = false; clearInterval(timerTick); timerTick = null;
    updateTimerUI(); return;
  }
  if (timerRemain <= 0) timerRemain = timerTotal;
  timerRunning = true;
  timerTick = setInterval(() => {
    timerRemain--;
    updateTimerUI();
    if (timerRemain <= 0) timerFinished();
  }, 1000);
  updateTimerUI();
}

function timerReset() {
  timerRunning = false; clearInterval(timerTick); timerTick = null;
  timerRemain = timerTotal; updateTimerUI();
}

function timerAutoStart() {
  if (timerRunning) { timerRemain = timerTotal; return; }
  timerRemain = timerTotal;
  timerRunning = true;
  timerTick = setInterval(() => {
    timerRemain--;
    updateTimerUI();
    if (timerRemain <= 0) timerFinished();
  }, 1000);
  document.getElementById('timerPanel').classList.remove('hidden');
  updateTimerUI();
}

// Timer events
document.getElementById('timerFab').addEventListener('click', () => {
  document.getElementById('timerPanel').classList.toggle('hidden');
  updateTimerUI();
});
document.getElementById('timerPanelClose').addEventListener('click', () =>

);

    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));

  })
);

function buildOverlays(svg) {
  svg.querySelectorAll('.ov-group').forEach(el => el.remove());
  MUSCLES.forEach(m => {
    const shapes = m.shapes[bodyView];
    if (!shapes || !shapes.length) return;
    const isSel  = selected === m.id;
    const isDim  = selected && !isSel;
    const g = document.createElementNS(NS, 'g');
    g.classList.add('ov-group'); g.dataset.muscle = m.id; g.style.cursor = 'pointer';
    shapes.forEach(s => {
      let el;
      const fo = isDim ? 0.08 : isSel ? 0.7 : 0.22;
      const so = isDim ? 0.08 : isSel ? 1.0 : 0.45;
      const op = s.opacity !== undefined ? s.opacity : 1;
      if (s.t === 'rect') {
        el = document.createElementNS(NS, 'rect');
        el.setAttribute('x',s.x); el.setAttribute('y',s.y);
        el.setAttribute('width',s.w); el.setAttribute('height',s.h); el.setAttribute('rx',s.rx);
      } else {
        el = document.createElementNS(NS, 'ellipse');
        el.setAttribute('cx',s.cx); el.setAttribute('cy',s.cy);
        el.setAttribute('rx',s.rx); el.setAttribute('ry',s.ry);
      }
      el.setAttribute('fill',m.color); el.setAttribute('fill-opacity', fo*op);
      el.setAttribute('stroke',m.color); el.setAttribute('stroke-width', isSel?2:1.5);
      el.setAttribute('stroke-opacity', so);
      g.appendChild(el);
    });
    // label
    const s0 = shapes[0];
    const tx = s0.t==='rect' ? s0.x+s0.w/2 : s0.cx;
    const ty = s0.t==='rect' ? s0.y+s0.h/2+2.5 : s0.cy+2.5;
    const lbl = document.createElementNS(NS,'text');
    lbl.setAttribute('x',tx); lbl.setAttribute('y',ty); lbl.setAttribute('text-anchor','middle');
    lbl.setAttribute('font-size', isSel?'7.5':'6.5'); lbl.setAttribute('font-weight','bold');
    lbl.setAttribute('font-family','sans-serif'); lbl.setAttribute('pointer-events','none');
    lbl.setAttribute('fill', isSel?'#fff':m.color); lbl.setAttribute('fill-opacity', isDim?0.2:0.9);
    lbl.textContent = m.labelShort;
    g.appendChild(lbl);
    g.addEventListener('click', () => toggleMuscle(m.id));
    svg.appendChild(g);
  });
}

function rebuildSVG() {
  const svg = document.getElementById('bodyDiagram');

}

  // week range (Mon–Sun)
  const day  = now.getDay();
  const diffToMon = (day === 0 ? -6 : 1 - day);
  const mon  = new Date(now); mon.setDate(now.getDate() + diffToMon); mon.setHours(0,0,0,0);
  const sun  = new Date(mon); sun.setDate(mon.getDate() + 6); sun.setHours(23,59,59,999);
  const thisWeek = logs.filter(l => { const d=new Date(l.date); return d>=mon && d<=sun; }).length;
  // most logged exercise
  const freq = {};
  logs.forEach(l => { freq[l.exerciseName] = (freq[l.exerciseName]||0)+1; });
  const topEx = Object.entries(freq).sort((a,b)=>b[1]-a[1])[0];

  document.getElementById('historyStats').innerHTML = `
    <div class="stat-card"><div class="stat-num">${logs.length}</div><div class="stat-label">総記録数</div></div>
    <div class="stat-card"><div class="stat-num">${thisWeek}</div><div class="stat-label">今週の記録</div></div>
    <div class="stat-card"><div class="stat-num" style="font-size:14px;line-height:1.3">${topEx?topEx[0]:'—'}</div><div class="stat-label">人気種目</div></div>`;
}

function renderHistoryTimeline() {
  const histSearch = document.getElementById('histSearch').value.trim().toLowerCase();
  let logs = getLogs();
  if (histSearch) logs = logs.filter(l => l.exerciseName.toLowerCase().includes(histSearch));
  const tl = document.getElementById('historyTimeline');
  if (!logs.length) {
    tl.innerHTML = `<div class="history-empty">
      <div class="history-empty-icon">📋</div>
      <p>${histSearch ? '条件に一致する記録がありません' : 'まだ記録がありません。\nトレーニングタブから種目を選んで\n最初の記録をつけてみましょう！'}</p>
    </div>`;
    return;
  }
  // group by date
  const groups = {};
  logs.forEach(l => { (groups[l.date] = groups[l.date]||[]).push(l); });
  tl.innerHTML = Object.entries(groups)
    .sort(([a],[b]) => b.localeCompare(a))
    .map(([date, dayLogs]) => {
      const d = new Date(date + 'T00:00:00');
      const label = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${DAYS_JA[d.getDay()]}）`;
      return `<div class="day-group">
        <div class="day-label">${label}</div>
        ${dayLogs.map(log => {
          const validSets = log.sets.filter(s => s.reps || s.weight);
          const maxW = validSets.reduce((mx,s) => Math.max(mx, s.weight||0), 0);
          const avgR = validSets.length
            ? Math.round(validSets.reduce((s,r) => s+(r.reps||0),0) / validSets.length)
            : 0;
          const summary = validSets.length
            ? `${validSets.length}セット${avgR ? ` × ${avgR}回` : ''}${maxW ? ` × 最大${maxW}kg` : ''}`
            : 'セット未入力';
          const color   = log.exerciseColor || '#818cf8';
          const prs     = getStoredPRs();
          const isLogPR = prs[log.exerciseName]?.logId === log.id;
          const setsHtml = log.sets.map((s,i) => `
            <tr>
              <td>Set ${i+1}</td>
              <td>${s.reps != null ? s.reps + ' 回' : '—'}</td>
              <td>${s.weight != null ? s.weight + ' kg' : '自重'}</td>
            </tr>`).join('');
          return `<div class="log-card${isLogPR?' style="border-color:rgba(250,204,21,.4)"':''}" data-id="${log.id}">
            <div class="log-card-header">
              <span class="log-cat-dot" style="background:${color}"></span>
              <div class="log-info">
                <div class="log-ex-name">${log.exerciseName}${isLogPR?'<span class="pr-history-tag">🏆 PR</span>':''}</div>
                <div class="log-summary">${summary}</div>
              </div>
              <span class="log-chevron">▶</span>
              <button class="log-delete-btn" data-id="${log.id}">削除</button>
            </div>
            <div class="log-detail">
              <table class="log-sets-table">
                <thead><tr><th>セット</th><th>回数</th><th>重量</th></tr></thead>
                <tbody>${setsHtml}</tbody>
              </table>
              ${log.note ? `<div class="log-note-text">📝 ${log.note}</div>` : ''}
            </div>
          </div>`;
        }).join('')}
      </div>`;
    }).join('');

  // expand/collapse
  tl.querySelectorAll('.log-card-header').forEach(header => {
    header.addEventListener('click', e => {
      if (e.target.classList.contains('log-delete-btn')) return;
      header.closest('.log-card').classList.toggle('expanded');
    });
  });
  // delete
  tl.querySelectorAll('.log-delete-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      if (!confirm('この記録を削除しますか？')) return;
      deleteLog(btn.dataset.id);
      renderHistory();
      showToast('🗑 記録を削除しました');
    });
  });
}

/* ───────────────────────────────────
   TOAST
─────────────────────────────────── */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

/* ───────────────────────────────────
   CONTROLLER
─────────────────────────────────── */
function toggleMuscle(id) {
  selected = (selected === id) ? null : id;
  const m = MUSCLES.find(d => d.id === id);
  if (selected && m && !m.views.includes(bodyView)) {
    bodyView = m.views[0];
    document.querySelectorAll('.view-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.view === bodyView)
    );
  }
  renderTraining();
  if (selected) setTimeout(() => document.getElementById('exerciseGrid').scrollIntoView({ behavior:'smooth', block:'start' }), 150);
}

function renderTraining() {
  rebuildSVG(); renderChips(); renderBanner(); renderExercises();
}

/* ───────────────────────────────────
   EVENTS
─────────────────────────────────── */
// view toggle (front/back)
document.querySelectorAll('.view-btn').forEach(btn =>
  btn.addEventListener('click', () => {
    bodyView = btn.dataset.view;
    document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.dataset.view === bodyView));
    renderTraining();
  })
);
// clear selection
document.getElementById('clearBtn').addEventListener('click', () => { selected = null; renderTraining(); });
// exercise search
document.getElementById('searchInput').addEventListener('input', e => {
  searchQ = e.target.value.trim().toLowerCase(); renderExercises();
});
// history search
document.getElementById('histSearch').addEventListener('input', renderHistoryTimeline);
// tabs
document.querySelectorAll('.tab-btn').forEach(btn =>
  btn.addEventListener('click', () => {
    currentTab = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === currentTab));
    document.getElementById('view-training').classList.toggle('active', currentTab === 'training');
    document.getElementById('view-history').classList.toggle('active',  currentTab === 'history');
    document.querySelector('header .search-wrap').style.display = currentTab === 'training' ? '' : 'none';
    if (currentTab === 'history') renderHistory();
  })
);

/* ───────────────────────────────────
   INIT
─────────────────────────────────── */
renderTraining();
</script>
